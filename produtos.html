<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos — Piauí Ceras</title>
  <meta name="description" content="Grupos de produtos da Piauí Ceras: cera de carnaúba, ceras e emulsões industriais, produtos químicos e matérias-primas agrícolas.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="site-header"></header>

  <section class="titulo-pagina">
    <div class="container">
      <h1>Nossos Produtos</h1>
      <p>Conheça os principais grupos de produtos que fornecemos</p>
    </div>
  </section>

  <!-- ==================================================
       GRUPOS DE PRODUTOS
       Os cartões abaixo são gerados automaticamente a
       partir da lista "produtos" no arquivo js/dados.js.
       ➜ Para adicionar/remover/editar um grupo, edite
         APENAS o js/dados.js — não precisa mexer aqui.
       ================================================== -->
  <section class="secao secao-alt">
    <div class="container">
      <div class="grade" data-produtos></div>
    </div>
  </section>

  <!-- Chamada para cotação -->
  <section class="secao">
    <div class="container">
      <div class="cta">
        <div>
          <h2>Não encontrou o que procura?</h2>
          <p>Trabalhamos com uma ampla gama de produtos. Consulte-nos.</p>
        </div>
        <a class="botao" href="contato.html">Solicitar cotação</a>
      </div>
    </div>
  </section>

  <footer id="site-footer"></footer>

  <script src="js/dados.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
